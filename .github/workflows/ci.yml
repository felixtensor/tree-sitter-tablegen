name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - LICENSE
      - README.md
      - docs/**
      - .editorconfig
      - .gitattributes
      - .gitignore
  pull_request:
    paths-ignore:
      - LICENSE
      - README.md
      - docs/**
      - .editorconfig
      - .gitattributes
      - .gitignore

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # GitHub hosted runners force JavaScript actions to Node 24 from 2026-06-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test parser
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2

      # Tier 1: Corpus tests & Binding tests
      - name: Run parser tests
        uses: tree-sitter/parser-test-action@v3
        with:
          test-rust: true
          test-node: false
          test-python: true
          test-go: true
          go-version: "1.23"
          test-swift: false
          test-zig: false

      # Parse examples without ERROR nodes as a required integration corpus.
      - name: Parse examples
        uses: tree-sitter/parse-action@v4
        id: parse-files
        with:
          files: examples/**/*.td

      - name: Upload parse failures
        if: ${{ failure() && steps.parse-files.outputs.failures != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: parse-failures-${{matrix.os}}
          path: ${{steps.parse-files.outputs.failures}}
          retention-days: 7
